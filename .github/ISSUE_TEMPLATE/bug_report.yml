name: Bug report
description: Report a problem with UniFi Network Monitor
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: unifi-version
    attributes:
      label: UniFi Network version
    validations:
      required: false
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant logs or diagnostics
      description: Please redact hostnames, usernames, API keys, webhook IDs and SNMP community strings.
      render: text
    validations:
      required: false
