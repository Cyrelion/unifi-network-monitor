  - type: grid
    column_span: 3
    cards:
      - type: heading
        heading: Network Stability & Events
      - type: history-graph
        title: WAN Availability Timeline (24h)
        hours_to_show: 24
        refresh_interval: 60
        logarithmic_scale: false
        entities:
          - entity: binary_sensor.unifi_network_monitor_wan1_online
            name: WAN1 (Fiber)
          - entity: binary_sensor.unifi_network_monitor_wan2_online
            name: WAN2 (Starlink)
        grid_options:
          columns: full
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            icon: mdi:alert-circle
            content: WAN Event
            icon_color: red
            tap_action:
              action: more-info
              entity: sensor.unifi_network_monitor_wan_total_outages_today
            uix:
              style: |
                ha-card {
                  {% if states('sensor.unifi_network_monitor_wan_total_outages_today') | int(0) > 0 %}
                    animation: blink 2s ease-in-out infinite;
                  {% endif %}
                }
                @keyframes blink {
                  0%, 100% { opacity: 1; }
                  50% { opacity: 0.3; }
                }
        alignment: center
        grid_options:
          columns: full
  - type: grid
    cards:
      - type: gauge
        entity: sensor.unifi_network_monitor_internet_uptime_today_percent
        name: Uptime Today
        min: 0
        max: 100
        severity:
          green: 99
          yellow: 95
          red: 0
        needle: true
      - type: custom:mushroom-entity-card
        entity: sensor.speedtest_download
