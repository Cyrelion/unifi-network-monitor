          action: call-service
          service: counter.reset
          target:
            entity_id:
              - sensor.unifi_network_monitor_wan_total_outages_today
              - sensor.unifi_network_monitor_wan1_outages_today
              - sensor.unifi_network_monitor_wan2_outages_today
        confirmation:
          text: Reset all daily counters?
